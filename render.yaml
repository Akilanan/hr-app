# Render Blueprint — deploys the HR app as ONE free web service.
# The database is Supabase Postgres (free, non-expiring) — set DATABASE_URL in the
# Render dashboard (Environment tab); see docs/DEPLOY_RENDER.md for the exact string.
# You'll be asked for ADMIN_EMAIL (and optionally ADMIN_PASSWORD) during creation.

services:
  - type: web
    name: hr-app
    runtime: node
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /api/health
    # Build ONLY compiles (no DB access): --include=dev keeps build tools (tsc, vite,
    # prisma CLI, tsx) even with NODE_ENV=production; db:generate needs no database.
    buildCommand: >-
      npm install --include=dev &&
      npm --prefix server install --include=dev &&
      npm --prefix client install --include=dev &&
      npm --prefix server run db:generate &&
      npm run build
    # All DB work runs at START, when Postgres is actually reachable (the build can run
    # before the DB is provisioned). All three are idempotent/guarded, so re-runs on
    # every restart are safe: db:sync creates/updates the schema, ensure-admin creates
    # the first admin only if none exists (temp password in the logs), seed-demo loads
    # demo data only into an empty DB.
    startCommand: >-
      npm --prefix server run db:sync &&
      npm --prefix server run ensure-admin &&
      npm --prefix server run seed-demo &&
      npm --prefix server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_HTTPS
        value: "true"
      # Supabase Postgres session-pooler string — managed in the dashboard, never in git.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
