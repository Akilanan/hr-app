name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # prisma generate reads the datasource url; a dummy SQLite url is enough
      # since CI only type-checks, lints, runs unit tests and builds (no DB I/O).
      DATABASE_URL: file:./ci.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck (server)
        run: npm --prefix server run typecheck

      - name: Typecheck (client)
        run: npm --prefix client run typecheck

      - name: Test (server)
        run: npm --prefix server test

      - name: Build
        run: npm run build
